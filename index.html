<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Tabata">
<title>Tabata Timer</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0d0d0d;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    transition: background-color 0.3s ease;
  }
  #app.work { background-color: #7a1f1f; }
  #app.rest { background-color: #1f4a2f; }
  #app.ready { background-color: #0d0d0d; }
  #app.done { background-color: #2a2a4a; }

  .phase-label {
    font-size: 22px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.85;
    margin-bottom: 10px;
  }
  .time {
    font-size: 96px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    margin-bottom: 20px;
  }
  .round {
    font-size: 18px;
    opacity: 0.7;
    margin-bottom: 40px;
  }
  .controls {
    display: flex;
    gap: 16px;
    margin-bottom: 30px;
  }
  button {
    font-size: 17px;
    font-weight: 600;
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    background: rgba(255,255,255,0.15);
    color: #fff;
    cursor: pointer;
  }
  button:active { background: rgba(255,255,255,0.3); }
  button.primary { background: #fff; color: #000; }

  .settings {
    display: flex;
    gap: 24px;
    font-size: 14px;
    opacity: 0.8;
  }
  .setting-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .setting-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
  .stepper { display: flex; align-items: center; gap: 10px; }
  .stepper button {
    padding: 6px 12px;
    font-size: 16px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
  }
  .stepper span { min-width: 32px; text-align: center; font-size: 18px; font-weight: 600; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app" class="ready">

  <div id="settingsPanel">
    <div class="settings">
      <div class="setting-group">
        <label>Work (s)</label>
        <div class="stepper">
          <button onclick="adjust('work', -5)">−</button>
          <span id="workVal">20</span>
          <button onclick="adjust('work', 5)">+</button>
        </div>
      </div>
      <div class="setting-group">
        <label>Rest (s)</label>
        <div class="stepper">
          <button onclick="adjust('rest', -5)">−</button>
          <span id="restVal">10</span>
          <button onclick="adjust('rest', 5)">+</button>
        </div>
      </div>
      <div class="setting-group">
        <label>Rounds</label>
        <div class="stepper">
          <button onclick="adjust('rounds', -1)">−</button>
          <span id="roundsVal">8</span>
          <button onclick="adjust('rounds', 1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <div class="phase-label" id="phaseLabel">READY</div>
  <div class="time" id="timeDisplay">20</div>
  <div class="round" id="roundDisplay">Round 1 of 8</div>

  <div class="controls">
    <button class="primary" id="startBtn" onclick="toggleStart()">Start</button>
    <button onclick="resetTimer()">Reset</button>
  </div>

</div>

<script>
let settings = { work: 20, rest: 10, rounds: 8 };
let state = { running: false, phase: 'ready', currentRound: 1, secondsLeft: settings.work, intervalId: null };

const app = document.getElementById('app');
const phaseLabel = document.getElementById('phaseLabel');
const timeDisplay = document.getElementById('timeDisplay');
const roundDisplay = document.getElementById('roundDisplay');
const startBtn = document.getElementById('startBtn');
const settingsPanel = document.getElementById('settingsPanel');

function adjust(key, delta) {
  if (state.running) return;
  let min = key === 'rounds' ? 1 : 5;
  settings[key] = Math.max(min, settings[key] + delta);
  document.getElementById(key + 'Val').textContent = settings[key];
  resetTimer();
}

function beep(freq, duration) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}

function updateDisplay() {
  timeDisplay.textContent = state.secondsLeft;
  roundDisplay.textContent = `Round ${state.currentRound} of ${settings.rounds}`;
  app.className = state.phase;
  if (state.phase === 'work') phaseLabel.textContent = 'WORK';
  else if (state.phase === 'rest') phaseLabel.textContent = 'REST';
  else if (state.phase === 'ready') phaseLabel.textContent = 'READY';
  else if (state.phase === 'done') phaseLabel.textContent = 'DONE';
}

function toggleStart() {
  if (state.running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function startTimer() {
  if (state.phase === 'ready' || state.phase === 'done') {
    state.currentRound = 1;
    state.phase = 'work';
    state.secondsLeft = settings.work;
    beep(880, 0.15);
  }
  state.running = true;
  startBtn.textContent = 'Pause';
  settingsPanel.classList.add('hidden');
  state.intervalId = setInterval(tick, 1000);
  updateDisplay();
}

function pauseTimer() {
  state.running = false;
  startBtn.textContent = 'Resume';
  clearInterval(state.intervalId);
}

function resetTimer() {
  clearInterval(state.intervalId);
  state.running = false;
  state.phase = 'ready';
  state.currentRound = 1;
  state.secondsLeft = settings.work;
  startBtn.textContent = 'Start';
  settingsPanel.classList.remove('hidden');
  updateDisplay();
}

function tick() {
  state.secondsLeft--;

  if (state.secondsLeft <= 0) {
    if (state.phase === 'work') {
      if (state.currentRound >= settings.rounds) {
        clearInterval(state.intervalId);
        state.running = false;
        state.phase = 'done';
        startBtn.textContent = 'Start';
        settingsPanel.classList.remove('hidden');
        beep(1200, 0.3);
        updateDisplay();
        return;
      }
      state.phase = 'rest';
      state.secondsLeft = settings.rest;
      beep(440, 0.15);
    } else if (state.phase === 'rest') {
      state.currentRound++;
      state.phase = 'work';
      state.secondsLeft = settings.work;
      beep(880, 0.15);
    }
  } else if (state.secondsLeft <= 3 && state.secondsLeft > 0) {
    beep(660, 0.08);
  }

  updateDisplay();
}

updateDisplay();

// Prevent screen dimming/sleep while app is open (best-effort, works in some browsers)
let wakeLock = null;
async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
  } catch (e) {}
}
document.addEventListener('visibilitychange', () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    requestWakeLock();
  }
});
requestWakeLock();
</script>
</body>
</html>
