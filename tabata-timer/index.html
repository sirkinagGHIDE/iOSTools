<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tabata Timer</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  text-align: center;
  margin: 0;
  padding: 20px;
  transition: background-color 0.25s;
  background-color: #111;
  color: white;
  box-sizing: border-box;
}

*, *::before, *::after {
  box-sizing: border-box;
}

/* ---------- Setup UI ---------- */
#setup {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100vh;
  gap: 14px;
  max-width: 420px;
  margin: 0 auto;
}

.setup-row {
  display: flex;
  justify-content: space-between;
  font-size: 20px;
}

input {
  width: 80px;
  font-size: 20px;
  text-align: right;
  background: #222;
  color: white;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 4px 8px;
}

input::placeholder {
  color: #777;
  opacity: 1;
}

.setup-nav {
  display: flex;
  gap: 8px;
  justify-content: space-between;
  margin-bottom: 4px;
}

.navBtn {
  flex: 1;
  margin: 0;
  font-size: 16px;
  padding: 8px 10px;
  background: #333;
  color: white;
  border: 1px solid #555;
  border-radius: 6px;
}

#startBtn {
  margin-top: 30px;
  font-size: 22px;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #28a745;
  color: white;
  cursor: pointer;
}

/* ---------- Timer UI ---------- */
#timer {
  display: none;
}

.big {
  font-size: 32px;
  font-weight: 600;
}

.phaseTime {
  font-size: 56px;
  font-weight: 700;
  margin: 12px 0;
}

.line {
  font-size: 18px;
  margin: 6px 0;
}

#roundSet {
  font-size: 22px;
  font-weight: 600;
}

button {
  margin: 8px;
  font-size: 18px;
  padding: 10px 16px;
  border-radius: 8px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
}

button:active {
  opacity: 0.7;
}
</style>
</head>
<body>

<!-- ---------- Setup Screen ---------- -->
<div id="setup">
  <div class="setup-row">
    <span><strong>Total Remaining</strong></span>
    <span id="setupRemaining">0:00</span>
  </div>

  <div class="setup-nav">
    <button type="button" class="navBtn" onclick="moveFocus(-1)">← Back</button>
    <button type="button" class="navBtn" onclick="moveFocus(1)">Next →</button>
  </div>

  <div class="setup-row"><span>Work (s)</span><input id="work" type="number" inputmode="numeric" min="0" step="5" placeholder="30"></div>
  <div class="setup-row"><span>Rest (s)</span><input id="rest" type="number" inputmode="numeric" min="0" step="5" placeholder="15"></div>
  <div class="setup-row"><span>Rounds / Set</span><input id="rounds" type="number" inputmode="numeric" min="1" step="1" placeholder="8"></div>
  <div class="setup-row"><span>Sets</span><input id="sets" type="number" inputmode="numeric" min="1" step="1" placeholder="3"></div>
  <div class="setup-row"><span>Set Break (s)</span><input id="setBreak" type="number" inputmode="numeric" min="0" step="5" placeholder="60"></div>
  <div class="setup-row"><span>Start Delay (s)</span><input id="delay" type="number" inputmode="numeric" min="0" step="5" placeholder="5"></div>

  <button id="startBtn" onclick="startWorkout()">Start</button>
</div>

<!-- ---------- Timer Screen ---------- -->
<div id="timer">
  <div class="big" id="phase"></div>
  <div class="phaseTime" id="phaseTime"></div>
  <div class="line" id="roundSet"></div>
  <div class="line" id="elapsed"></div>
  <div class="line" id="remaining"></div>

  <button onclick="pauseResume()" id="pauseBtn">Pause</button>
  <button onclick="resetTimer()">Reset</button>
  <button onclick="skipPhase()">Skip Phase</button>
  <button onclick="backToSetup()">New Workout</button>
</div>

<script>
let timeline = [];
let totalDuration = 0;
let startTime;
let paused = false;
let pauseStart = null;
let pausedTotal = 0;
let currentPhaseIndex = 0;
let lastSecond = null;
let workoutCompleteBeeped = false;
let tickInterval = null;

// ---------- Audio ----------
// Browsers block audio until a user gesture; audioCtx is created lazily on Start.
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}
function beep(freq, dur) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  gain.gain.value = 0.5;
  osc.start();
  osc.stop(audioCtx.currentTime + dur / 1000);
}

// ---------- Helpers ----------
function fmt(sec) {
  sec = Math.max(0, Math.floor(sec));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + s.toString().padStart(2, "0");
}

// ---------- Live Remaining (Setup) ----------
const setupFieldOrder = ["work","rest","rounds","sets","setBreak","delay"];

function updateSetupRemaining() {
  const work = +document.getElementById("work").value;
  const rest = +document.getElementById("rest").value;
  const rounds = +document.getElementById("rounds").value;
  const sets = +document.getElementById("sets").value;
  const setBreak = +document.getElementById("setBreak").value;
  const delay = +document.getElementById("delay").value;

  let total =
    delay +
    sets * (rounds * work + (rounds - 1) * rest) +
    (sets - 1) * setBreak;

  document.getElementById("setupRemaining").innerText = fmt(total);
}

function moveFocus(direction) {
  const currentIndex = setupFieldOrder.findIndex(id => document.activeElement?.id === id);
  const targetIndex = (currentIndex + direction + setupFieldOrder.length) % setupFieldOrder.length;
  const targetInput = document.getElementById(setupFieldOrder[targetIndex]);

  if (targetInput) {
    targetInput.focus();
    targetInput.select();
  }
}

setupFieldOrder.forEach(id => {
  const input = document.getElementById(id);
  input.addEventListener("input", updateSetupRemaining);
  input.addEventListener("focus", () => input.select());
});

updateSetupRemaining();

// ---------- Controls ----------
function pauseResume() {
  const btn = document.getElementById("pauseBtn");
  if (!paused) {
    paused = true;
    pauseStart = Date.now();
    btn.innerText = "Resume";
  } else {
    paused = false;
    pausedTotal += Date.now() - pauseStart;
    pauseStart = null;
    btn.innerText = "Pause";
  }
}

function resetTimer() {
  startTime = Date.now();
  paused = false;
  pauseStart = null;
  pausedTotal = 0;
  currentPhaseIndex = 0;
  lastSecond = null;
  workoutCompleteBeeped = false;
  document.getElementById("pauseBtn").innerText = "Pause";
}

function skipPhase() {
  currentPhaseIndex++;
  if (currentPhaseIndex >= timeline.length) {
    currentPhaseIndex = timeline.length - 1;
  }
  startTime = Date.now();
  pausedTotal = 0;
  lastSecond = null;
}

function backToSetup() {
  if (tickInterval) clearInterval(tickInterval);
  tickInterval = null;
  document.getElementById("timer").style.display = "none";
  document.getElementById("setup").style.display = "flex";
  document.body.style.backgroundColor = "#111";
}

// ---------- Start ----------
function startWorkout() {
  ensureAudio();

  const workSec = Number(document.getElementById("work").value);
  const restSec = Number(document.getElementById("rest").value);
  const roundsPerSet = Number(document.getElementById("rounds").value);
  const totalSets = Number(document.getElementById("sets").value);
  const setBreakSec = Number(document.getElementById("setBreak").value);
  const startDelaySec = Number(document.getElementById("delay").value);

  timeline = [];
  totalDuration = 0;
  workoutCompleteBeeped = false;
  currentPhaseIndex = 0;
  paused = false;
  pauseStart = null;
  pausedTotal = 0;
  lastSecond = null;

  if (startDelaySec > 0) {
    timeline.push({ type: "Start Delay", duration: startDelaySec });
    totalDuration += startDelaySec;
  }

  for (let set = 1; set <= totalSets; set++) {
    for (let round = 1; round <= roundsPerSet; round++) {
      timeline.push({ type: "Work", set, round, duration: workSec });
      totalDuration += workSec;

      if (!(set === totalSets && round === roundsPerSet)) {
        timeline.push({ type: "Rest", set, round, duration: restSec });
        totalDuration += restSec;
      }
    }
    if (set < totalSets && setBreakSec > 0) {
      timeline.push({ type: "Set Break", set, duration: setBreakSec });
      totalDuration += setBreakSec;
    }
  }

  document.getElementById("setup").style.display = "none";
  document.getElementById("timer").style.display = "block";
  document.getElementById("pauseBtn").innerText = "Pause";

  startTime = Date.now();

  if (tickInterval) clearInterval(tickInterval);
  tickInterval = setInterval(tick, 250);
}

// ---------- Timer ----------
function tick() {
  if (paused || timeline.length === 0) return;

  let elapsed = Math.floor((Date.now() - startTime - pausedTotal) / 1000);

  while (timeline[currentPhaseIndex] && elapsed >= timeline[currentPhaseIndex].duration) {
    const next = timeline[currentPhaseIndex + 1];

    if (next?.type === "Work") beep(880, 500);
    else if (next?.type === "Rest") beep(350, 500);
    else if (next?.type === "Set Break") beep(1200, 500);

    elapsed -= timeline[currentPhaseIndex].duration;
    currentPhaseIndex++;
    startTime = Date.now() - elapsed * 1000;
    pausedTotal = 0;
    lastSecond = null;
    if (currentPhaseIndex >= timeline.length) break;
  }

  if (currentPhaseIndex >= timeline.length) {
    document.getElementById("phase").innerText = "Workout Complete";
    document.getElementById("phaseTime").innerText = "";
    document.getElementById("roundSet").innerText = "";
    document.body.style.backgroundColor = "black";

    if (!workoutCompleteBeeped) {
      beep(660, 700);
      setTimeout(() => beep(880, 700), 750);
      workoutCompleteBeeped = true;
    }
    return;
  }

  const phase = timeline[currentPhaseIndex];
  const remaining = phase.duration - elapsed;

  if (remaining <= 3 && remaining !== lastSecond) {
    beep(440, 200);
    lastSecond = remaining;
  }

  const colors = {
    "Work": "#28a745",
    "Rest": "#dc3545",
    "Set Break": "#007bff",
    "Start Delay": "#6c757d"
  };
  document.body.style.backgroundColor = colors[phase.type] || "black";

  document.getElementById("phase").innerText = phase.type;
  document.getElementById("phaseTime").innerText = fmt(remaining);

  document.getElementById("roundSet").innerText =
    phase.round
      ? "Round: " + phase.round + " / " + document.getElementById("rounds").value +
        "    Set: " + phase.set + " / " + document.getElementById("sets").value
      : "";

  const totalElapsed =
    timeline.slice(0, currentPhaseIndex).reduce((a, p) => a + p.duration, 0) + elapsed;

  document.getElementById("elapsed").innerText = "Elapsed: " + fmt(totalElapsed);
  document.getElementById("remaining").innerText =
    "Remaining: " + fmt(totalDuration - totalElapsed);
}
</script>
</body>
</html>
